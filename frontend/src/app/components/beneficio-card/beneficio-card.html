<mat-card
  [class]="{ created: beneficio().ativo, closed: !beneficio().ativo }"
  class="cardButton"
  appearance="outlined"
>
  <mat-card-title class="title">{{ beneficio().nome }} </mat-card-title>
  <mat-card-content class="description">
    <h2>
      {{ beneficio().descricao }}
    </h2>
  </mat-card-content>
  <mat-card-subtitle class="category">
    Valor: {{ beneficio().valor }}</mat-card-subtitle
  >
  <mat-divider></mat-divider>
  <mat-card-actions class="actionbar" align="end">
    <mat-slide-toggle
      [(ngModel)]="beneficio().ativo"
      (change)="onAlterarStatus(confirmDialog, beneficio())"
    ></mat-slide-toggle>
    <button
      matButton="filled"
      color="warn"
      (click)="onUpdateBeneficio(beneficio())"
    >
      <mat-icon>edit</mat-icon>
      Editar
    </button>
  </mat-card-actions>
</mat-card>

<ng-template #confirmDialog let-message>
  <h1 mat-dialog-title>Confirma?</h1>
  <div mat-dialog-content>
    <p class="dialog-message">{{ message.message }}</p>
  </div>
  <div mat-dialog-actions>
    <button matButton [mat-dialog-close]="false">Cancelar</button>
    <button matButton="filled" color="primary" [mat-dialog-close]="true">
      Confirmar
    </button>
  </div>
</ng-template>
