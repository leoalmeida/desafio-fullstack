services:
  backend-module:
    build: 
      context: ./backend_module
      dockerfile: Dockerfile
    image: leoalmeida/backend-module:latest
    container_name: backend-module
    env_file: ./.env
    ports:
      - ${SPRING_LOCAL_PORT}${{ secrets.SPRING_LOCAL_PORT }}:${SPRING_DOCKER_PORT}${{ secrets.SPRING_DOCKER_PORT }}
    environment: 
      SPRING_APPLICATION_JSON: '{
          "spring.datasource.url" : "${DB_URL}${{ secrets.DB_URL }}",
          "spring.datasource.username" : "${DB_USERNAME}${{ secrets.DB_USERNAME }}",
          "spring.datasource.password" : "${DB_PASSWORD}${{ secrets.DB_PASSWORD }}",
          "spring.datasource.driver-class-name" : "${DB_DRIVER}${{ secrets.DB_DRIVER }}"
        }' 
    networks:
      - app-network
      
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: leoalmeida/frontend:latest
    container_name: frontend
    env_file: ./.env
    ports:
      - ${FRONTEND_LOCAL_PORT}${{ secrets.FRONTEND_LOCAL_PORT }}:${FRONTEND_DOCKER_PORT}${{ secrets.FRONTEND_DOCKER_PORT }}
    stdin_open: true
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

