name: Code Quality Analysis for Backend Module

on:
  workflow_call:

jobs:
  code-quality-backend:
    name: Lint Backend Module
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Compile EJB Module
        run: mvn -B -f ejb-module/pom.xml clean install -DskipTests

      - name: Run Checkstyle
        run: mvn -B -f backend-module/pom.xml spotless:apply

      - name: Compile Backend Module
        run: mvn -B -f backend-module/pom.xml clean package -DskipTests

      - name: Run Checkstyle
        run: mvn -B -f backend-module/pom.xml checkstyle:check

      - name: Generate Checkstyle report
        run: mvn -B -f backend-module/pom.xml checkstyle:checkstyle

      - name: Run PMD check
        run: mvn -B -f backend-module/pom.xml pmd:check

      - name: generate PMD report
        run: mvn -B -f backend-module/pom.xml pmd:pmd
      
      #- name: Run spotbugs check
      #  run: mvn -B -f backend-module/pom.xml spotbugs:check
  
      #- name: Generate SpotBugs report
      #  run: mvn -B -f backend-module/pom.xml spotbugs:spotbugs

  code-quality-frontend:
      runs-on: ubuntu-latest # Use the latest Ubuntu runner
      strategy:
         matrix:
            node-version: [24]
      steps:
         - name: Checkout Repository
           uses: actions/checkout@v6 # Action to checkout your repository code

         - name: Setup Node.js
           uses: actions/setup-node@v6
           with:
              node-version: ${{ matrix.node-version }}
              cache: "npm"
              cache-dependency-path: ./frontend/package-lock.json

         - name: Install Dependencies
           working-directory: frontend
           run: npm ci

         - name: Run Prettier check to ensure code formatting
           working-directory: frontend
           run: npm run prettier

         - name: Run Prettier check to ensure code formatting
           working-directory: frontend
           run: npm run lint -- --fix

        
