name: Build dos artefatos de Backend do projeto

on:
  workflow_call:

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build backend module
        run: mvn -B -f backend-module/pom.xml clean package -DskipTests
      - name: Run Integration Tests
        run: mvn -B -f backend-module/pom.xml verify
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v6
        with:
          name: backend-jar
          path: backend-module/target/*.jar
          retention-days: 1
      - name: Upload EJB Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ejb-module-jar
          path: ejb-module/target/*.jar
          retention-days: 1